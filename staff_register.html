<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="icon" href="icons/icon-192.png">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow">
          <h3 class="text-center mb-4">Staff Registration</h3>
          <form id="staffRegisterForm">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="staffId" class="form-label">Staff ID</label>
              <input type="text" class="form-control" id="staffId" required>
            </div>
            <div class="mb-3">
              <label for="department" class="form-label">Department</label>
              <input type="text" class="form-control" id="department" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
            <p class="mt-3 text-center">Already have an account? <a href="staff_login.html">Login here</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('staffRegisterForm').addEventListener('submit', function(e){
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const staffId = document.getElementById('staffId').value.trim();
      const department = document.getElementById('department').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
      }

      let staffUsers = JSON.parse(localStorage.getItem('staffUsers')) || [];

      // Check if email already exists
      if(staffUsers.some(u => u.email === email)){
        alert("Email already registered!");
        return;
      }

      const newStaff = {
        name, email, staffId, department, password
      };staffUsers.push(newStaff);
      localStorage.setItem('staffUsers', JSON.stringify(staffUsers));
      alert("Registration successful! Please login.");
      window.location.href = "staff_login.html";
    });
  </script>
  <script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator

      .serviceWorker.register('sw.js');
    });
}
</script>
</body>
</html>
