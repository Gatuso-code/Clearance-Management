<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4 text-center">Student Registration</h2>

  <form id="registrationForm" class="mx-auto" style="max-width:500px;">
    <div class="mb-3">
      <label for="studentName" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="studentName" placeholder="Enter full name" required>
    </div>
    <div class="mb-3">
      <label for="studentID" class="form-label">Student ID</label>
      <input type="text" class="form-control" id="studentID" placeholder="Enter student ID" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" required>
    </div>
    <div class="mb-3">
      <label for="department" class="form-label">Department</label>
      <input type="text" class="form-control" id="department" placeholder="Enter department" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <p class="text-center mt-3">
    Already have an account? <a href="login.html">Login here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('registrationForm').addEventListener('submit', function(e){
    e.preventDefault();

    // Get student data
    const studentData = {
      name: document.getElementById('studentName').value,
      id: document.getElementById('studentID').value,
      email: document.getElementById('email').value,
      department: document.getElementById('department').value,
      password: document.getElementById('password').value
    };

    // Save in localStorage (as array of students)
    let students = JSON.parse(localStorage.getItem('students')) || [];
    students.push(studentData);
    localStorage.setItem('students', JSON.stringify(students));

    // Redirect to login page
    window.location.href = "login.html";
});
</script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>
</body>
</html>
