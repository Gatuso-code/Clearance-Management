<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="icon" href="icons/icon-192.png">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow">
          <h3 class="text-center mb-4">Staff Login</h3>
          <form id="staffLoginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
            <p class="mt-3 text-center">Don't have an account? <a href="staff_register.html">Register here</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('staffLoginForm').addEventListener('submit', function(e){
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const staffUsers = JSON.parse(localStorage.getItem('staffUsers')) || [];
      const user = staffUsers.find(u => u.email === email && u.password === password);

      if(user){
        localStorage.setItem('loggedInStaff', JSON.stringify(user));
        window.location.href = "staff_dashboard.html";
      } else {
        alert("Invalid credentials!");
      }
    });
  </script>
  <script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>
</body>
</html>
