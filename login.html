<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4 text-center">Student Login</h2>

  <form id="loginForm" class="mx-auto" style="max-width:400px;">
    <div class="mb-3">
      <label for="loginID" class="form-label">Student ID</label>
      <input type="text" class="form-control" id="loginID" placeholder="Enter Student ID" required>
    </div>
    <div class="mb-3">
      <label for="loginPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="loginPassword" placeholder="Enter Password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Login</button>
  </form>

  <p class="text-center mt-3">
    Don't have an account? <a href="register.html">Register here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const studentID = document.getElementById('loginID').value;
    const password = document.getElementById('loginPassword').value;

    // Get students from localStorage
    const students = JSON.parse(localStorage.getItem('students')) || [];
    const student = students.find(s => s.id === studentID && s.password === password);

    if(student){
        localStorage.setItem('loggedInStudent', JSON.stringify(student));
        window.location.href = "index.html";
    } else {
        alert('Invalid credentials!');
    }
});
</script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>
</body>
</html>
