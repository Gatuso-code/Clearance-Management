<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">
<link rel="icon" href="icons/icon-192.png">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card p-4 shadow">
          <h3 class="text-center mb-4">Admin Login</h3>
          <form id="adminLoginForm">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize default admin if not present
    if(!localStorage.getItem('adminUser')){
      const defaultAdmin = { username: "admin", password: "admin123", name: "Admin" };
      localStorage.setItem('adminUser', JSON.stringify(defaultAdmin));
    }

    document.getElementById('adminLoginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const adminUser = JSON.parse(localStorage.getItem('adminUser'));
      if(username === adminUser.username && password === adminUser.password){
        localStorage.setItem('loggedInAdmin', JSON.stringify(adminUser));
        window.location.href = "admin_dashboard.html";
      } else {
        alert("Invalid credentials!");
      }
    });
  </script>
  <script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
    });
}
</script>
</body>
</html>
